version: "3.8"

services:
  engine:
    build: .
    container_name: mpe-engine
    command: >
      python -m mpe
      --cot-url udp+wo://239.2.3.1:6969
      --adsb-center 51.3632,-0.2652
      --adsb-radius 250
      --log-level INFO
    environment:
      - DB_URL=postgresql+asyncpg://mpe:mpe@db:5432/mpe_c2
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    network_mode: host  # For UDP multicast to reach ATAK

  db:
    image: postgis/postgis:16-3.4
    container_name: mpe-db
    environment:
      POSTGRES_USER: mpe
      POSTGRES_PASSWORD: mpe
      POSTGRES_DB: mpe_c2
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpe -d mpe_c2"]
      interval: 5s
      timeout: 3s
      retries: 5

  dashboard:
    build: .
    container_name: mpe-dashboard
    command: >
      uvicorn mpe.server:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
